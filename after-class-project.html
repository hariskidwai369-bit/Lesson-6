<!DOCTYPE html>
<html>

<head>
    <title>Library Book Donation</title>
</head>

<body>

<center>

<h1>📚 Library Book Donation</h1>

<p>
Share your favourite books with our school library and help others enjoy reading.
</p>

<hr>

<img src="https://images.unsplash.com/photo-1521587760476-6c12a4b040da?w=350&h=220&fit=crop"
alt="Library Books"
width="350"
height="220">

</center>

<hr>

<form>

<fieldset>

<legend><b>Donor Details</b></legend>

<label>Your Name</label><br>
<input type="text" placeholder="Enter your full name">

<br><br>

<label>Donor ID</label><br>
<input type="password" placeholder="Enter your donor ID">

<br><br>

<label>Donation Date</label><br>
<input type="date">

</fieldset>

<br>

<center>

<img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=300&h=200&fit=crop"
alt="Reading Book"
width="300"
height="200">

</center>

<br>

<fieldset>

<legend><b>Book Details</b></legend>

<label>Select Book Category</label>

<br>

<select>

<option>Choose Category</option>
<option>Story Books</option>
<option>Science</option>
<option>History</option>
<option>Education</option>

</select>

<br><br>

<label>Book Condition</label>

<br>

<input type="radio" name="condition"> Excellent

<br>

<input type="radio" name="condition"> Good

<br>

<input type="radio" name="condition"> Used

<br><br>

<label>Book Title or Notes</label>

<br>

<textarea rows="4" cols="35"
placeholder="Write the book title or any message"></textarea>

</fieldset>

<br>

<center>

<img src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d?w=300&h=200&fit=crop"
alt="Library"
width="300"
height="200">

</center>

<br>

<fieldset>

<legend><b>Preferred Drop-Off Day</b></legend>

<input type="checkbox"> Monday

<br>

<input type="checkbox"> Wednesday

<br>

<input type="checkbox"> Friday

</fieldset>

<br>

<center>

<input type="submit" value="📖 Donate Book">

</center>

</form>

<hr>

<center>

<p>
<b>"A book donated today can inspire a reader tomorrow."</b>
</p>

<hr>

<p>
Created by <b>Haris Kidwai</b>
</p>

</center>

</body>

</html>
